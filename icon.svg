<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#F4F1EC"/>
  <!-- Outer ring suggesting a wheel -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#2F4858" stroke-width="14"/>
  <!-- Inner quiet line graph curve, calm and steady -->
  <path d="M 130 300 Q 200 250 256 270 T 382 230"
        fill="none" stroke="#2F4858" stroke-width="14" stroke-linecap="round"/>
  <!-- Small grounding dot at the curve's start, like a starting point -->
  <circle cx="130" cy="300" r="10" fill="#2F4858"/>
</svg>
